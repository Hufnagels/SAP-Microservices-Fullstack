server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Polyfill crypto.randomUUID for non-HTTPS (HTTP-only LAN deployment).
    # crypto.getRandomValues is available in all contexts; only randomUUID requires HTTPS.
    sub_filter '</head>' '<script>if(!crypto.randomUUID){crypto.randomUUID=function(){return"10000000-1000-4000-8000-100000000000".replace(/[018]/g,function(c){return(+c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>+c/4).toString(16)})}}</script></head>';
    sub_filter_once on;

    location ~ ^/(auth|labeling) {
        proxy_pass http://traefik:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
