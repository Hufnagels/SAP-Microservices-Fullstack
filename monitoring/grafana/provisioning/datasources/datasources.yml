apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100

  - name: InfluxDB-OPC-UA
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: compani
      defaultBucket: opcua
      tlsSkipVerify: true
    secureJsonData:
      token: my-super-secret-token
