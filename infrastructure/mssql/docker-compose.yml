# ── MSSQL Infrastructure Stack ────────────────────────────────────────────────
# Runs independently from the app stack.
# Start this first: docker compose -f infrastructure/mssql/docker-compose.yml up -d
#
# Shares `db_net` with the main app stack.
# The app stack declares db_net as external — this stack OWNS it.
#
# Lifecycle: this stack should survive `docker compose down -v` on the app stack.
# Only run `docker compose -f infrastructure/mssql/docker-compose.yml down -v`
# when you want to wipe the database completely.

services:
  mssql:
    # Use standard SQL Server 2022 on Linux (x86/amd64 LXC).
    # azure-sql-edge was for ARM dev (M1 Mac) — it breaks in LXC due to capability restrictions.
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_server
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-MyS3cureP@ss!}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - ../../data/mssql:/var/opt/mssql
    networks:
      - db_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -No -C > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

networks:
  db_net:
    name: db_net
    driver: bridge
